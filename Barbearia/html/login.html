<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Pai & Filho Barbershop</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --gold: #d4a32e;
        }

        body {
            font-family: Poppins, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;

            background:
                radial-gradient(circle at top, #3d2b08 0%, #000 40%),
                #000;

            color: white;
            overflow: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;

            background:
                radial-gradient(circle, #d4a32e22 2px, transparent 2px);

            background-size: 80px 80px;
            opacity: .3;
            pointer-events: none;
        }

        .login-container {
            width: 95%;
            max-width: 1100px;

            display: flex;

            background: rgba(20, 20, 20, .9);
            backdrop-filter: blur(15px);

            border: 1px solid rgba(212, 163, 46, .4);
            border-radius: 25px;

            overflow: hidden;

            box-shadow: 0 0 50px rgba(212, 163, 46, .15);

            animation: entrada 1s ease;
        }

        @keyframes entrada {
            from {
                opacity: 0;
                transform: translateY(40px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-left {
            flex: 1;
            background: linear-gradient(135deg,
                    #111,
                    #1d1d1d);

            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px;
        }

        .login-left img {
            width: 350px;
            max-width: 100%;

            border-radius: 50%;

            border: 4px solid var(--gold);

            animation: brilho 3s infinite;
            transition: .5s;
        }

        .login-left img:hover {
            transform: scale(1.05) rotate(5deg);
        }

        @keyframes brilho {

            0% {
                box-shadow: 0 0 15px rgba(212, 163, 46, .4);
            }

            50% {
                box-shadow: 0 0 40px rgba(212, 163, 46, .8);
            }

            100% {
                box-shadow: 0 0 15px rgba(212, 163, 46, .4);
            }
        }

        .login-right {
            flex: 1;
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h1 {
            font-size: 42px;
            color: var(--gold);
            margin-bottom: 10px;
        }

        .login-right h1::after {
            content: "";
            display: block;
            width: 80px;
            height: 3px;
            background: var(--gold);
            margin-top: 10px;
        }

        .login-right p {
            color: #aaa;
            margin-bottom: 30px;
        }

        .input-box {
            position: relative;
            margin-bottom: 20px;
        }

        .input-box i {
            position: absolute;
            left: 15px;
            top: 18px;
            color: var(--gold);
        }

        .input-box input {
            width: 100%;
            padding: 15px 15px 15px 45px;

            background: #1a1a1a;

            border: 1px solid #333;

            color: white;

            border-radius: 12px;

            outline: none;

            transition: .3s;
        }

        .input-box input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(212, 163, 46, .3);
        }

        .btn {
            width: 100%;
            padding: 16px;

            border: none;
            border-radius: 12px;

            background: linear-gradient(45deg,
                    #d4a32e,
                    #f0c85f);

            color: #000;
            font-weight: bold;
            font-size: 16px;

            cursor: pointer;

            transition: .4s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(212, 163, 46, .5);
        }

        .extras {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .extras a {
            color: var(--gold);
            text-decoration: none;
        }

        .link {
            text-align: center;
            margin-top: 25px;
            color: white;
            text-decoration: none;
            transition: .3s;
        }

        .link:hover {
            color: #d4a32e;
            letter-spacing: 1px;
        }


        .link:hover {
            letter-spacing: 1px;
        }

        @media(max-width:900px) {

            .login-container {
                flex-direction: column;
            }

            .login-left {
                padding: 30px;
            }

            .login-left img {
                width: 220px;
            }

            .login-right {
                padding: 30px;
            }

            .login-right h1 {
                font-size: 32px;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">

        <div class="login-left">
            <img src="/img/Add a heading.png" alt="Logo">
        </div>

        <div class="login-right">

            <h1>Entrar</h1>

            <p>
                Acesse sua conta da Barbearia Pai & Filho
            </p>

            <div class="input-box">
                <i class="fas fa-envelope"></i>
                <input type="email" placeholder="Seu e-mail">
            </div>

            <div class="input-box">
                <i class="fas fa-lock"></i>
                <input type="password" placeholder="Sua senha">
            </div>

            <button class="btn">
                <a href="/html/index.html">ENTRAR</a>
            </button>

            <div class="extras">
                <label>
                    <input type="checkbox">
                    Lembrar-me
                </label>

                <a href="#">
                    Esqueceu a senha?
                </a>
            </div>

            <a href="#" class="link">
                Criar uma conta
            </a>

        </div>

    </div>

</body>

</html>
